name: Integration Test

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: '5'
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '21'
        #cache: 'maven' ## using manual cache for multi project

    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: pre build with Maven
      run: mvn clean install -Pskip-gpg-signing -DskipTests

    - name: Build & Verify with Maven
      env:
        # Test required inputs
        KITEWORKS_ACTIVITY_LIST_UUID: ${{ secrets.KITEWORKS_ACTIVITY_LIST_UUID }}
        KITEWORKS_ACTIVITY_LIST2_UUID: ${{ secrets.KITEWORKS_ACTIVITY_LIST2_UUID }}
        # All required
        KITEWORKS_BASE_URI: ${{ secrets.KITEWORKS_BASE_URI }}
        KITEWORKS_ACCESS_TOKEN_URI: ${{ secrets.KITEWORKS_ACCESS_TOKEN_URI }}
        KITEWORKS_CLIENT_APP_SCOPES: ${{ secrets.KITEWORKS_CLIENT_APP_SCOPES }}
        KITEWORKS_CLIENT_ID: ${{ secrets.KITEWORKS_CLIENT_ID }}
        KITEWORKS_CLIENT_SECRET: ${{ secrets.KITEWORKS_CLIENT_SECRET }}
        #JWT required elements
        KITEWORKS_PRIVATE_KEY: ${{ secrets.KITEWORKS_PRIVATE_KEY }}
        KITEWORKS_AUDIENCE_URI: ${{ secrets.KITEWORKS_AUDIENCE_URI }}
        KITEWORKS_ISSUER_URI: ${{ secrets.KITEWORKS_ISSUER_URI }}
        # JWT + Username/Password required
        KITEWORKS_USERNAME: ${{ secrets.KITEWORKS_USERNAME }}
        # Username/Password required
        KITEWORKS_PASSWORD: ${{ secrets.KITEWORKS_PASSWORD }}
        # Username/Password + Signature required
        KITEWORKS_REDIRECT_URI: ${{ secrets.KITEWORKS_REDIRECT_URI }}
        # Signature required
        KITEWORKS_SIGNATURE_KEY: ${{ secrets.KITEWORKS_SIGNATURE_KEY }}
        KITEWORKS_USER_ID: ${{ secrets.KITEWORKS_USER_ID }}
      run: mvn install  -Dspring.profiles.active=cicd -Pskip-gpg-signing

    - name: Package artifacts
      run: |
       mkdir staging
       cp  */target/*.jar staging
       cp -rf */target/*reports staging
       cp -r  */target/generated-sources/openapi/api staging

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: Package
        path: staging
        overwrite: true

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 #v6.4.2
      if: success() || failure() # always run even if the previous step fails
      with:
        report_paths: '**/target/**-reports/TEST-*.xml'
        check_name: Test Report

